# Browsers
windowrule = match:class ^(Brave-browser)$, workspace 1
windowrule = match:class ^(brave-browser)$, workspace 1
windowrule = match:class ^(brave)$, workspace 1
windowrule = match:class ^(firefox)$, workspace 1
windowrule = match:class ^(org.mozilla.firefox)$, workspace 1
windowrule = match:class ^(Chromium-browser)$, workspace 1
windowrule = match:class  ^(Org.chromium.Chromium)$, workspace 1
windowrule = match:class ^(Chromium-browser)$, workspace 1
windowrule = match:class ^(Org.chromium.Chromium)$, workspace 1
# windowrule = match:class ^(.)$, no_blur # chrome-like browsers no blur menus

# File Managers
windowrule = match:class ^(thunar)$, workspace 4
windowrule = match:class ^(org.gnome.nautilus)$, workspace 4

# virt-manager
windowrule = match:class ^(virt-manager)$, workspace 3
windowrule = match:class ^(virt-viewer)$, workspace 3
windowrule = match:class ^(virt-viewer)$, maximize on
windowrule = match:class ^(virt-viewer)$, fullscreen on
windowrule = match:class ^(virt-viewer)$, fullscreen_state -1 2

# rofi / wofi
windowrule = match:class ^(Rofi)$, pin on
windowrule = match:class ^(wofi)$, pin on
windowrule = match:class ^(wofi)$, dim_around on
layerrule = match:namespace rofi, blur on
layerrule = match:namespace rofi, no_anim on
layerrule = match:namespace rofi, dim_around on

# Variety
windowrule = match:class ^(variety)$, float on
windowrule = match:class ^(variety)$, match:title ^(Imágenes de Variety)$, size 100% 5%
windowrule = match:class ^(variety)$, match:title ^(Imágenes de Variety)$, move 0% 90%

# Waybar
layerrule = match:namespace waybar, blur on
layerrule = match:namespace waybar, ignore_alpha 0

# Aesthtics
layerrule = match:namespace logout_dialog, blur on
layerrule = match:namespace wallpaper, no_anim on
layerrule = match:namespace notifications, animation slide right
layerrule = match:namespace notifications, blur on
layerrule = match:namespace notifications, ignore_alpha 0
layerrule = match:namespace hyprpicker, no_anim on
layerrule = match:namespace selection, no_anim on
# no gaps, borders, rounding on fullscreen windows -----------------------------------
workspace = f[1], gapsout:0, gapsin:0
windowrule = border_size 0, match:float 0, match:workspace f[1]
windowrule = rounding 0, match:float 0, match:workspace f[1]

# System
windowrule = match:class ^(hypr-sys-menu)$, float on
windowrule = match:class ^(hypr-sys-menu)$, center on
windowrule = match:class ^(hypr-sys-menu)$, size 1000 700
windowrule = match:modal true, float on
windowrule = match:class ^(xdg-desktop-portal-gtk)$, float on
# Dialogo para grabar en brave desde google, es flotante
windowrule = match:class ^(brave)$, match:title ^(.*desea guardar)$, float on
windowrule = match:class ^(brave)$, match:title ^(.*desea abrir)$, float on
windowrule = match:class ^(thunar)$, match:title ^(Renombrar .*)$, float on

# Others
windowrule = match:class ^(org.gnome.Calculator)$, float on
windowrule = match:class steam_proton, tile on
windowrule = match:title (Gaia Sky), tile on
windowrule = match:class ^(dosbox)$, float on
# windowrule = match:class ^(org.dosbox-staging.dosbox-staging)$, float on, size 70% 70%
windowrule = match:class ^(io.github.josephmawa.Bella)$, float on
windowrule = match:class ^(org.gnome.World.PikaBackup)$, float on

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more

