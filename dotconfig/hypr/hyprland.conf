#
# Please note not all available settings / options are set here.
# For a full list, see the wiki

# Default Apps
$terminal = kitty -d ~
$terminal2 = alacritty
$browser = brave-browser --password-store=basic
$browser2 = firefox
$files = thunar ~
$logout = wlogout -b 5
$launcher = rofi -show drun -show-icons -theme layout-apps
$launcher_run = rofi -show run -config $HOME/.config/rofi/themes/dmenu.rasi -run-shell-command 'kitty --hold {cmd}'


# Source a file (multi-file configs)
source = $HOME/.config/hypr/conf/envs.conf
source = $HOME/.config/hypr/conf/monitors.conf
source = $HOME/.config/hypr/conf/autostart.conf
source = $HOME/.config/hypr/conf/keybinds.conf
source = $HOME/.config/hypr/conf/theme.conf
source = $HOME/.config/hypr/themes/$theme.conf
source = $HOME/.config/hypr/conf/input.conf
source = $HOME/.config/hypr/conf/looknfeel.conf
source = $HOME/.config/hypr/conf/rules.conf

