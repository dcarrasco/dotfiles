# Special keys
bindd = ,XF86AudioMute, Mute, exec, $hypr_scripts/hypr-set-volume toggle
bindde = ,XF86AudioLowerVolume, Decrease volume, exec, $hypr_scripts/hypr-set-volume down
bindde = ,XF86AudioRaiseVolume, Increase volume, exec, $hypr_scripts/hypr-set-volume up

bindde = ,XF86MonBrightnessDown, Decrease brightness, exec, $hypr_scripts/hypr-set-brightness down
bindde = ,XF86MonBrightnessUp, Increase brightness, exec, $hypr_scripts/hypr-set-brightness up

