[general]
live_config_reload = true
import = ["~/.config/alacritty/theme.toml"]

working_directory = "/home/daniel"

[colors]
draw_bold_text_with_bright_colors = true

[font]
size = 15

[font.glyph_offset]
y = 4

[font.offset]
y = 8

[mouse]
hide_when_typing = true

[[keyboard.bindings]]
action = "ToggleFullscreen"
key = "F11"
mods = "None"

[window]
decorations = "Full"
# decorations = "None"
opacity = 0.8
blur = false

[window.dimensions]
columns = 110
lines = 30

[window.padding]
x = 10
y = 10
